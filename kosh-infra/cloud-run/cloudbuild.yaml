# kosh-infra/cloud-run/cloudbuild.yaml
steps:
  # ── 1. Build das imagens ───────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    args: [build, -t, gcr.io/$PROJECT_ID/ingest-api,   ./ingest-api]
  - name: gcr.io/cloud-builders/docker
    args: [build, -t, gcr.io/$PROJECT_ID/worker,        ./worker]
  - name: gcr.io/cloud-builders/docker
    args: [build, -t, gcr.io/$PROJECT_ID/alert-worker,  ./alert-worker]
  - name: gcr.io/cloud-builders/docker
    args: [build, -t, gcr.io/$PROJECT_ID/telegram-bot,  ./telegram-bot]
  - name: gcr.io/cloud-builders/docker
    args: [build, -t, gcr.io/$PROJECT_ID/webhooks,      ./webhooks]
  - name: gcr.io/cloud-builders/docker
    args: [build, -t, gcr.io/$PROJECT_ID/suitecrm,      ./suitecrm]

  # ── 2. Push das imagens ────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    args: [push, gcr.io/$PROJECT_ID/ingest-api]
  - name: gcr.io/cloud-builders/docker
    args: [push, gcr.io/$PROJECT_ID/worker]
  - name: gcr.io/cloud-builders/docker
    args: [push, gcr.io/$PROJECT_ID/alert-worker]
  - name: gcr.io/cloud-builders/docker
    args: [push, gcr.io/$PROJECT_ID/telegram-bot]
  - name: gcr.io/cloud-builders/docker
    args: [push, gcr.io/$PROJECT_ID/webhooks]
  - name: gcr.io/cloud-builders/docker
    args: [push, gcr.io/$PROJECT_ID/suitecrm]

  # ── 3. Deploy no Cloud Run (Injetando KOSH_CONFIG) ──────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        # ingest-api (Público)
        gcloud run deploy ingest-api \
          --image gcr.io/$PROJECT_ID/ingest-api \
          --region southamerica-east1 \
          --allow-unauthenticated \
          --memory 256Mi --cpu 1 \
          --min-instances 0 --max-instances 10 \
          --set-secrets KOSH_CONFIG=KOSH_CONFIG:latest

        # worker (Privado - Sempre ligado)
        gcloud run deploy worker \
          --image gcr.io/$PROJECT_ID/worker \
          --region southamerica-east1 \
          --no-allow-unauthenticated \
          --memory 256Mi --cpu 1 \
          --min-instances 1 --max-instances 2 \
          --set-secrets KOSH_CONFIG=KOSH_CONFIG:latest

        # alert-worker (Privado - Sempre ligado)
        gcloud run deploy alert-worker \
          --image gcr.io/$PROJECT_ID/alert-worker \
          --region southamerica-east1 \
          --no-allow-unauthenticated \
          --memory 256Mi --cpu 1 \
          --min-instances 1 --max-instances 1 \
          --set-secrets KOSH_CONFIG=KOSH_CONFIG:latest

        # telegram-bot (Público para Webhook)
        gcloud run deploy telegram-bot \
          --image gcr.io/$PROJECT_ID/telegram-bot \
          --region southamerica-east1 \
          --allow-unauthenticated \
          --memory 256Mi --cpu 1 \
          --min-instances 1 --max-instances 1 \
          --set-secrets KOSH_CONFIG=KOSH_CONFIG:latest

        # webhooks (Público para APIs / Webhooks Asaas e Inter)
        gcloud run deploy webhooks \
          --image gcr.io/$PROJECT_ID/webhooks \
          --region southamerica-east1 \
          --allow-unauthenticated \
          --memory 512Mi --cpu 1 \
          --min-instances 0 --max-instances 10 \
          --timeout 60s \
          --set-secrets KOSH_CONFIG=KOSH_CONFIG:latest

        # suitecrm (Public via Firebase rewrite /crm-app/**)
        gcloud run deploy suitecrm \
          --image gcr.io/$PROJECT_ID/suitecrm \
          --region southamerica-east1 \
          --allow-unauthenticated \
          --memory 1Gi --cpu 1 \
          --min-instances 0 --max-instances 3 \
          --timeout 300s \
          --set-secrets KOSH_CONFIG=KOSH_CONFIG:latest

images:
  - gcr.io/$PROJECT_ID/ingest-api
  - gcr.io/$PROJECT_ID/worker
  - gcr.io/$PROJECT_ID/alert-worker
  - gcr.io/$PROJECT_ID/telegram-bot
  - gcr.io/$PROJECT_ID/webhooks
  - gcr.io/$PROJECT_ID/suitecrm
